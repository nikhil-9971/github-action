name: Job Output Workflow


on:
    push:
        branches: [main]


jobs:
    set-output:
        runs-on: ubuntu-latest
        steps:
            - name: Set output variable
              id: set_output
              run: echo "date=${date}" >> $GITHUB_OUTPUT
    use-output:
        needs: set-output
        runs-on: ubuntu-latest
        steps:
            - name: Use output variable
              run: echo "The date is ${{ needs.set-output.outputs.date }}"