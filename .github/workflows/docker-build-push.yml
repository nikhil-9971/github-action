name: Docker Build and Push

on:
  workflow_call:

    # push:
    #     branches: [main]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: login to Dockerhub
              uses: docker/login-action@v3
              with:
                username: ${{ vars.DOCKERHUB_USER }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

            - name: Build & Push Docker image
              uses: docker/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                  ${{ vars.DOCKERHUB_USER }}/github-action-app:${{github.ref_name}}
                  ${{ vars.DOCKERHUB_USER }}/github-action-app:latest
                  ${{ vars.DOCKERHUB_USER }}/github-action-app:${{ github.sha }}


